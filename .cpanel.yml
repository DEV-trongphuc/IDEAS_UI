---
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/ideas.edu.vn
    - mkdir -p $DEPLOYPATH/wp-content/new_public/LANDINGPAGE_MBA/
    - mkdir -p $DEPLOYPATH/wp-content/themes/LANDINGPAGE_MBA/
    # Deploy .htaccess and root scripts
    - cp .htaccess $DEPLOYPATH/.htaccess
    - cp create-pages.php $DEPLOYPATH/create-pages.php
    - cp wp-convert-webp.php $DEPLOYPATH/wp-convert-webp.php
    - cp wp-migrate-db-webp.php $DEPLOYPATH/wp-migrate-db-webp.php
    - cp export_references.php $DEPLOYPATH/export_references.php
    - cp restore_receiver.php $DEPLOYPATH/restore_receiver.php
    - cp check_index_headline.php $DEPLOYPATH/check_index_headline.php
    - cp inspect_public_html.php $DEPLOYPATH/inspect_public_html.php
    - cp clean_public_html.php $DEPLOYPATH/clean_public_html.php
    - cp inspect_functions.php $DEPLOYPATH/inspect_functions.php
    - cp inspect_plugins.php $DEPLOYPATH/inspect_plugins.php
    - cp inspect_db.php $DEPLOYPATH/inspect_db.php
    - cp manage_plugins.php $DEPLOYPATH/manage_plugins.php
    - cp recover_site.php $DEPLOYPATH/recover_site.php
    # Deploy landing pages
    - /bin/rsync -av --exclude='.git*' wp-content/new_public/LANDINGPAGE_MBA/ $DEPLOYPATH/wp-content/new_public/LANDINGPAGE_MBA/
    # Deploy WordPress themes (PHP, CSS, JS)
    - /bin/rsync -av --exclude='.git*' wp-content/themes/LANDINGPAGE_MBA/ $DEPLOYPATH/wp-content/themes/LANDINGPAGE_MBA/
    # Deploy committed uploads (optimized images)
    - mkdir -p $DEPLOYPATH/wp-content/uploads/
    - /bin/rsync -av --exclude='.git*' wp-content/uploads/ $DEPLOYPATH/wp-content/uploads/

